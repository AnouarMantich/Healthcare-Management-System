<div class="form-container">
  <h2>Patient Information</h2>
  <form [formGroup]="patientForm" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="address">Address</label>
      <input id="address" formControlName="address" type="text" placeholder="Enter address" />
      <div
        class="error"
        *ngIf="patientForm.get('address')?.invalid && patientForm.get('address')?.touched"
      >
        Address is required
      </div>
    </div>

    <div class="form-group">
      <label for="phone">Phone</label>
      <input id="phone" formControlName="phone" type="text" placeholder="Enter phone number" />
      <div
        class="error"
        *ngIf="patientForm.get('phone')?.invalid && patientForm.get('phone')?.touched"
      >
        Phone must be 10 digits
      </div>
    </div>

    <div class="form-group">
      <label for="cin">cin</label>
      <input id="cin" formControlName="cin" type="text" placeholder="Enter CIN" />
      <div class="error" *ngIf="patientForm.get('cin')?.invalid && patientForm.get('cin')?.touched">
        CIN is required (8-12 characters)
      </div>
    </div>

    <button type="submit" [disabled]="patientForm.invalid">Submit</button>
  </form>
</div>
